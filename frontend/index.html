<!DOCTYPE html>
<html lang = "zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        .header {
            display: flex;
            justify-content:space-between;
            background-color: pink;
        }

        .header h1{
            margin:0;
            font-size:24;
            font-weight:bold;
        }

        body{
            margin: 0;
        }

        /* 搜索表单区域 */
        .search-form {
            display: flex;
            align-items:center;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* 表单控件样式 */
        .search-form input[type="text"], .search-form select {
            margin-right: 10px;
            padding: 5px 10px;
            border-radius: 4px;
            width: 200px;
        }

        /* 按钮样式 */
        .search-form button {
            border:none;
            border-radius: 4px;
            margin-left: 5px;
            padding:10px, 15px;
            /* margin: 10px; */
            background-color: #007bff;
            color: white;
            cursor: pointer;

        }

        .search-form button.clear{
            background-color: #6c757d;
        }

        .table {
            min-width: 100%;
            border-collapse: collapse;
            margin: 0 20px;
        }
        /* 设置表格单元边框 */
        .table td, .table th {
            border: 1px solid #ddd;
        }

        /* 设置整个表格边框 */
        .table-bordered {
            border: 2px solid red;
        }

        .avatar {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        /* 设置表头颜色 */
        .table th{
            background-color: #6c757d;
        }

        .footer {
            text-align: center;
            color: white;
            background-color: #8f8c8c;
        }

        .footer .company-name{
            font-size: 1.1em;
            font-weight: bold;
        }

        .footer .copyright {
            font-size: 0.9em;
        }


    </style>
    <title>tlias智能学习辅助系统</title>
</head>
<body>
    <div class="header">
        
        <h1>tlias智能学习辅助系统</h1>
        <p>退出登录</p>

    </div>

    <form class="search-form" action="" method="get">
        <input type="text" name="name" placeholder="姓名">
        <select name="gender">
            <option value="">性别</option>
            <option value="1">男</option>
            <option value="2">女</option>
        </select>
        <select name="job">
            <option value="">职位</option>
            <option value="1">班主任</option>
            <option value="2">讲师</option>
            <option value="3">学工主管</option>
            <option value="4">教研主管</option>
            <option value="5">咨询师</option>
        </select>
        
        <input type="hidden" name="id" value="1">
        <button type="submit">查询</button>
        <button type="reset" class="clear">重置</button>
    </form>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>姓名</th>
                <th>性别</th>
                <th>头像</th>
                <th>职位</th>
                <th>入职日期</th>
                <th>最后操作时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>令狐冲</td>
                <td>男</td>
                <td><img src="https://via.placeholder.com/50"  class="avatar"</td>
                <td>讲师</td>
                <td>2023-07-30</td>
                <td>2023-07-30T10:00:00Z</td>
                <td class="btn-group">
                    <button>编辑</button>
                    <button>删除</button>
                </td>
            </tr>
            <tr>
                <td>任盈盈</td>
                <td>女</td>
                <td><img src="https://via.placeholder.com/50"  class="avatar"></td>
                <td>讲师</td>
                <td>2023-07-30</td>
                <td>2023-07-30T10:00:00Z</td>
                <td class="btn-group">
                    <button>编辑</button>
                    <button>删除</button>
                </td>
            </tr>
            <tr>
                <td>岳不群</td>
                <td>男</td>
                <td><img src="https://via.placeholder.com/50"  class="avatar"></td>
                <td>教研主管</td>
                <td>2019-01-01</td>
                <td>2023-07-30T10:00:00Z</td>
                <td class="btn-group">
                    <button>编辑</button>
                    <button>删除</button>
                </td>
            </tr>
            <tr>
                <td>宁中则</td>
                <td>女</td>
                <td><img src="https://via.placeholder.com/50"  class="avatar"></td>
                <td>班主任</td>
                <td>2018-06-01</td>
                <td>2023-07-29T09:00:00Z</td>
                <td class="btn-group">
                    <button>编辑</button>
                    <button>删除</button>
                </td>
            </tr>
        </tbody>
    </table>

    <footer class="footer">
        <p class="company-name">江苏传智播客教育科技股份有限公司</p>
        <p class="copyright">版权所有 Copyright 2006-2024 All Rights Reserved</p>
    </footer>

</body>
</html>
